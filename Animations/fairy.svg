<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 100">
  <style>
    /* The main flapping motion simulating 3D perspective via scaling */
    @keyframes organic-flap-right {
      0% { transform: scaleX(1) rotate(0deg) skewY(0deg); filter: brightness(1); }
      50% { transform: scaleX(0.15) rotate(-10deg) skewY(5deg); filter: brightness(1.3); } /* Closed/Back state */
      100% { transform: scaleX(1) rotate(0deg) skewY(0deg); filter: brightness(1); }
    }
    @keyframes organic-flap-left {
      0% { transform: scaleX(1) rotate(0deg) skewY(0deg); filter: brightness(1); }
      50% { transform: scaleX(0.15) rotate(10deg) skewY(-5deg); filter: brightness(1.3); }
      100% { transform: scaleX(1) rotate(0deg) skewY(0deg); filter: brightness(1); }
    }

    /* Secondary wings lag slightly behind for fluid drag */
    @keyframes organic-flap-right-secondary {
      0% { transform: scaleX(0.9) rotate(-5deg); opacity: 0.6; }
      50% { transform: scaleX(0.1) rotate(-15deg); opacity: 0.8; }
      100% { transform: scaleX(0.9) rotate(-5deg); opacity: 0.6; }
    }
    @keyframes organic-flap-left-secondary {
      0% { transform: scaleX(0.9) rotate(5deg); opacity: 0.6; }
      50% { transform: scaleX(0.1) rotate(15deg); opacity: 0.8; }
      100% { transform: scaleX(0.9) rotate(5deg); opacity: 0.6; }
    }

    /* Gentle body bobbing */
    @keyframes levitate {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
    }

    /* Core rotation */
    @keyframes slow-spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Particle magic */
    @keyframes twinkle {
      0%, 100% { opacity: 0; transform: scale(0); }
      50% { opacity: 1; transform: scale(1); }
    }

    .wing-r { animation: organic-flap-right 0.4s ease-in-out infinite; transform-origin: 60px 50px; }
    .wing-l { animation: organic-flap-left 0.4s ease-in-out infinite; transform-origin: 60px 50px; }
    
    .wing-r-sec { animation: organic-flap-right-secondary 0.4s ease-in-out infinite; transform-origin: 60px 50px; animation-delay: 0.05s; }
    .wing-l-sec { animation: organic-flap-left-secondary 0.4s ease-in-out infinite; transform-origin: 60px 50px; animation-delay: 0.05s; }

    .fairy-body { animation: levitate 2.5s ease-in-out infinite; }
    .core-spin { animation: slow-spin 4s linear infinite; transform-origin: 60px 50px; }
    
    .particle { animation: twinkle 1.5s ease-in-out infinite; }
    
    /* Utility for opacity that doesn't exist in standalone SVG without Tailwind */
    .blur-sm { filter: blur(4px); }
    .opacity-50 { opacity: 0.5; }
  </style>

  <defs>
    <linearGradient id="wingGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ec4899" stop-opacity="0.9" /> <!-- Pink 500 -->
      <stop offset="50%" stop-color="#a855f7" stop-opacity="0.8" /> <!-- Purple 500 -->
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0.9" /> <!-- Cyan 500 -->
    </linearGradient>
    
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="60%" stop-color="#fbbf24" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#ec4899" stop-opacity="0" />
    </radialGradient>

    <filter id="blurGlow">
      <feGaussianBlur stdDeviation="1.5" />
    </filter>
  </defs>

  <g class="fairy-body">
     <!-- Secondary/Lower Wings (Lagging) -->
     <path class="wing-l-sec" d="M60,50 Q40,80 20,70 Q10,50 60,50 Z" fill="url(#wingGradient)" />
     <path class="wing-r-sec" d="M60,50 Q80,80 100,70 Q110,50 60,50 Z" fill="url(#wingGradient)" />

     <!-- Primary/Upper Wings -->
     <path class="wing-l" d="M60,50 C40,10 10,0 5,20 C0,40 30,50 60,50 Z" fill="url(#wingGradient)" stroke="white" stroke-width="0.5" stroke-opacity="0.5" />
     <path class="wing-r" d="M60,50 C80,10 110,0 115,20 C120,40 90,50 60,50 Z" fill="url(#wingGradient)" stroke="white" stroke-width="0.5" stroke-opacity="0.5" />

     <!-- Magic Particles -->
     <circle cx="30" cy="20" r="1.5" fill="white" class="particle" style="animation-delay: 0s" />
     <circle cx="90" cy="20" r="1" fill="#fbbf24" class="particle" style="animation-delay: 0.5s" />
     <circle cx="20" cy="60" r="1" fill="#06b6d4" class="particle" style="animation-delay: 0.8s" />
     <circle cx="100" cy="60" r="1.5" fill="#ec4899" class="particle" style="animation-delay: 1.2s" />

     <!-- Central Core -->
     <circle cx="60" cy="50" r="8" fill="url(#coreGlow)" class="blur-sm opacity-50" />
     <g class="core-spin">
       <path d="M60,42 L63,47 L68,50 L63,53 L60,58 L57,53 L52,50 L57,47 Z" fill="white" filter="url(#blurGlow)" opacity="0.9" />
       <path d="M60,45 L62,48 L65,50 L62,52 L60,55 L58,52 L55,50 L58,48 Z" fill="#ffffd0" />
     </g>
  </g>
</svg>